<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HD Door Designer — guided wizard QA harness</title>
<!--
  Visual QA for the GUIDED WIZARD without WordPress.
  Run a static server from the plugin root, then open this file:
      python -m http.server 8000
      → http://localhost:8000/tools/preview-test.html
  It builds the same compact "customer view" the PHP serves (class-hd-catalogue.php
  customer_view()) from the full catalogue, sets HD_DD_CONFIG.assetBase to the model's
  captured Endurance host, and mounts the real App. Images hotlink from that host for
  QA (production serves a same-origin mirror); a 404 just falls back to a label tile.
-->
<link rel="stylesheet" href="../assets/css/hd-door-designer.css">
<style>
  /* Harness-page chrome ONLY. The wizard itself is styled exclusively by the real
     plugin stylesheet linked above, so this harness reflects production 1:1.
     (Do NOT re-add .hd-dd__* rules here — overriding the plugin CSS is what once
     masked a production-only responsive bug.) */
  body { font-family: system-ui, sans-serif; margin: 0; padding: 1.5rem; color: #222; background: #fafafa; }
  h1 { font-size: 1.05rem; text-align: center; }
  .harness { max-width: 1180px; margin: 0 auto; }
  #mount { min-height: 60vh; }
  #harness-status { color: #888; font-size: 0.85rem; margin-top: 0.75rem; text-align: center; }
</style>
</head>
<body>
<div class="harness">
  <h1>Guided wizard — QA harness</h1>
  <div id="mount" data-hd-door-designer-harness>Loading…</div>
  <div id="harness-status"></div>
</div>

<!-- render model + compositor -->
<script src="../assets/js/render-model.js"></script>
<script src="../assets/js/preview.js"></script>
<!-- wizard modules -->
<script src="../assets/js/wizard/step-config.js"></script>
<script src="../assets/js/wizard/wizard-controller.js"></script>
<script src="../assets/js/wizard/step-renderer.js"></script>
<script src="../assets/js/wizard/review.js"></script>
<!-- app bootstrap (exposes window.HD_DD_App; its DOMContentLoaded auto-start finds no
     [data-hd-door-designer] node here, so we mount manually below) -->
<script src="../assets/js/hd-door-designer.js"></script>
<script>
(function () {
  var mount = document.getElementById('mount');
  var statusEl = document.getElementById('harness-status');

  // Mirror of class-hd-catalogue.php → customer_view(): project the full catalogue
  // down to the compact, customer-facing shape the wizard consumes.
  var CUSTOMER_HEADINGS = [
    'Door Type', 'Frame Design', 'Frame Colour', 'Door Design',
    'Door Colour (External)', 'Door Colour (Internal)', 'Door Glass',
    'Door Hinged On', 'Master Leaf', 'Hardware Type', 'Handle', 'Letterplate', 'Knocker'
  ];
  function slimChoices(choices) {
    return (choices || []).map(function (c) { return { label: c.label || '', id: c.id != null ? c.id : null }; });
  }
  function slimGlazing(byStyle) {
    var out = {};
    Object.keys(byStyle || {}).forEach(function (s) { out[s] = Array.isArray(byStyle[s]) ? slimChoices(byStyle[s]) : []; });
    return out;
  }
  function slimSidelights(node) {
    if (!node || typeof node !== 'object') { return null; }
    function pick(key) { return (node[key] && Array.isArray(node[key].choices)) ? slimChoices(node[key].choices) : []; }
    return { sidelightType: pick('sidelightType'), sidelightGlass: pick('sidelightGlass') };
  }
  function buildCustomerView(full) {
    var types = [], byType = {};
    Object.keys(full).forEach(function (typeName) {
      var node = full[typeName];
      if (!node || typeof node !== 'object' || !node.fields) { return; } // skip _assetBase/_schema/etc.
      types.push(typeName);
      var fields = {};
      CUSTOMER_HEADINGS.forEach(function (h) {
        if (node.fields[h] && node.fields[h].choices) { fields[h] = slimChoices(node.fields[h].choices); }
      });
      byType[typeName] = {
        hingeSideField: node.fields['Door Hinged On'] ? 'Door Hinged On' : (node.fields['Master Leaf'] ? 'Master Leaf' : ''),
        hasInternalColour: !!node.fields['Door Colour (Internal)'],
        hasKnocker: !!node.fields['Knocker'],
        hasFrameShape: !!(node.fields['Frame Design'] && node.fields['Frame Design'].choices.length > 1),
        fields: fields,
        glazingByStyle: slimGlazing(node.glazingByStyle),
        knockerByStyle: slimGlazing(node.knockerByStyle),
        sidelights: slimSidelights(node.sidelights)
      };
    });
    return { types: types, byType: byType };
  }

  Promise.all([
    fetch('../data/endurance-catalogue-full.json').then(function (r) { return r.json(); }),
    fetch('../data/render-model.json').then(function (r) { return r.json(); }),
    fetch('../data/style-categories.json').then(function (r) { return r.json(); }).catch(function () { return null; })
  ]).then(function (res) {
    var full = res[0], model = res[1], categories = res[2];
    var customerView = buildCustomerView(full);
    // The App reads assetBase from window.HD_DD_CONFIG — point it at the captured host.
    window.HD_DD_CONFIG = { assetBase: model._assetBase, heroImage: 'https://hertfordshiredoors.co.uk/wp-content/uploads/2024/02/AVANTAL.jpg' };
    statusEl.textContent = 'Loaded ' + customerView.types.length + ' door types · assetBase ' + model._assetBase;
    mount.innerHTML = '';
    new window.HD_DD_App(mount, customerView, model, categories).render();
  }).catch(function (e) {
    mount.textContent = 'Failed to load data — are you serving over http (python -m http.server)? ' + e;
  });
})();
</script>
</body>
</html>
